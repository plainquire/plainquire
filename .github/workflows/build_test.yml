name: Build & Test

on: [ push, pull_request ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Test
      run: |
        echo "Build" && exit 0
    #- name: Checkout
    #  uses: actions/checkout@v4
    #- name: Setup .NET
    #  uses: actions/setup-dotnet@v4
    #  with:
    #    dotnet-version: 8.0.x
    #- name: Build
    #  run: dotnet build --configuration Release -warnaserror

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pages: write
      id-token: write
    outputs:
      test_report_json: ${{ steps.test_report.outputs.json }}
      coverage_report_json: ${{ steps.coverage_report.outputs.json }}
      versionA: ${{ steps.vars.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run tests
        run: dotnet test --configuration Release -warnaserror --logger:trx --logger:html --collect:"XPlat Code Coverage" --settings:.runsettings --results-directory "testreport" --filter "ClassName~SyntaxConfigurationTests"
      - name: Aggregate and publish test results
        id: test_report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            testreport/*.trx
          comment_mode: off
          check_run: false
          job_summary: true
          json_file: testreport/testresult.json
      - name: Aggregate code coverage
        uses: danielpalme/ReportGenerator-GitHub-Action@5.3.11
        if: always()
        with:
          reports: testreport/**/coverage.opencover.xml
          title: "Code Coverage"
          targetdir: coveragereport
          reporttypes: HtmlInline;MarkdownSummaryGithub;JsonSummary
          license: ${{ secrets.REPORTGENERATOR_LICENSE }}
      - name: Publish coverage
        id: coverage_report
        if: always()
        shell: bash
        run: |
          cat coveragereport/SummaryGithub.md | sed -e 's/# Summary - Code Coverage/## Code Coverage/g' >> $GITHUB_STEP_SUMMARY
          echo "json=$(cat coveragereport/Summary.json | tr --delete '\n' | sed -e 's/[()\`]/Y/g')" >> $GITHUB_OUTPUT
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: testreport
      - name: Upload code coverage results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-results
          path: coveragereport

  badges:
    needs: [build, test]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - name: HelloOutA
        run: |
          echo "---"
          echo "build: ${{ needs.build.result }}"
          echo "---"
          echo "coverage: ${{ fromJson(needs.test.outputs.coverage_report_json).summary.linecoverage }} lines"
          echo "coverage: ${{ fromJson(needs.test.outputs.coverage_report_json).summary.branchcoverage }} branches"
          echo "coverage: ${{ fromJson(needs.test.outputs.coverage_report_json).summary.methodcoverage }} methods"
          echo "---"
          echo "tests: ${{ fromJson(needs.test.outputs.test_report_json).stats.runs_succ }} passed"
          echo "tests: ${{ fromJson(needs.test.outputs.test_report_json).stats.runs_fail }} failed"
          
      - name: Create badges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LICENSE: "MIT"
          BUILD_STATUS: ${{ needs.build.result == 'success' && 'passing' || 'failed' }}
        run:  |
          mkdir badges
          
          LATEST_RELEASE=$(curl -sH "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/plainquire/plainquire/releases/latest" | jq -r .tag_name)
          echo "Latest release tag: $LATEST_RELEASE"
          echo "curl https://img.shields.io/badge/version-${LATEST_RELEASE}-blue > badges/version.svg"
          curl https://img.shields.io/badge/release-${LATEST_RELEASE}-blue > badges/release.svg
          
          echo "curl https://img.shields.io/badge/license-${LICENSE}-green > badges/license.svg"
          curl https://img.shields.io/badge/license-${LICENSE}-green > badges/license.svg
          
          BUILD_COLOR=${{ needs.build.result == 'success' && 'green' || 'red' }}
          curl https://img.shields.io/badge/build-${BUILD_STATUS}-${BUILD_COLOR} > badges/build.svg
          
          COVERAGE_STATUS=${{ fromJson(needs.test.outputs.coverage_report_json).summary.linecoverage }}        
          [[ $COVERAGE_STATUS -lt 85 ]] && COVERAGE_COLOR="red" || { [[ $COVERAGE_STATUS -lt 90 ]] && COVERAGE_COLOR="orange" || COVERAGE_COLOR="green"; }
          curl https://img.shields.io/badge/coverage-${COVERAGE_STATUS}%25-${COVERAGE_COLOR} > badges/coverage.svg
          
          TESTS_PASSED=${{ fromJson(needs.test.outputs.test_report_json).stats.runs_succ }}
          TESTS_FAILED=${{ fromJson(needs.test.outputs.test_report_json).stats.runs_fail }}
          [[ ${TESTS_FAILED} -eq 0 ]] && TEST_COUNT=${TESTS_PASSED} || TEST_COUNT=${TESTS_FAILED}
          [[ ${TESTS_FAILED} -eq 0 ]] && TEST_STATUS="passed" || TEST_STATUS="failed"
          [[ ${TESTS_FAILED} -eq 0 ]] && TEST_COLOR="green" || TEST_COLOR="red"
          echo "curl https://img.shields.io/badge/tests-${TEST_COUNT}_${TEST_STATUS}-${TEST_COLOR} > badges/tests.svg"
          curl https://img.shields.io/badge/tests-${TEST_COUNT}_${TEST_STATUS}-${TEST_COLOR} > badges/tests.svg

      - name: Upload badges
        uses: actions/upload-artifact@v4
        with:
          name: badges
          path: badges